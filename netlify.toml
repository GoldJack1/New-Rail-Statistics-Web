# Next.js app lives in new-site/ (monorepo). Netlify clones the repo root, so base
# must point at that subdirectory. Do NOT set publish — @netlify/plugin-nextjs sets
# the correct output; publishing raw .next as static files causes site-wide 404s.
#
# Netlify UI (Site configuration → Build & deploy → Build settings):
#   Base directory, Package directory, Build command, Publish directory — all EMPTY.
# If any of those are filled in, they can override this file and break routing.
[build]
  base = "new-site"
  command = "npm ci && npm run build"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
