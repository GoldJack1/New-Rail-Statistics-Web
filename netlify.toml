# Next.js app lives in new-site/ (monorepo). Netlify clones the repo root, so base
# must point at that subdirectory. publish must differ from base (Netlify requirement);
# @netlify/plugin-nextjs reads .next and wires up SSR/route handlers — it does not
# serve raw .next as a static site.
#
# Netlify UI (Site configuration → Build & deploy → Build settings):
#   Base directory, Package directory, Build command, Publish directory — all EMPTY.
# If any of those are filled in, they can override this file and break routing.
[build]
  base = "new-site"
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"
  # NEXT_PUBLIC_* values are intentionally inlined into client bundles once Phase 2
  # wires Firebase/App Check. Tell the secrets scanner these keys are expected.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_DATABASE_URL,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID,NEXT_PUBLIC_RECAPTCHA_SITE_KEY,NEXT_PUBLIC_USE_FIREBASE_EMULATOR,NEXT_PUBLIC_USE_LOCAL_DATA_ONLY,NEXT_PUBLIC_LOCAL_DEV_LOGIN_BYPASS,NEXT_PUBLIC_USE_OSM_PROXY,DARWIN_API_ORIGIN,DARWIN_API_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
