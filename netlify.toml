# Next.js app lives in new-site/ (monorepo). Netlify clones the repo root, so base
# must point at that subdirectory. publish must differ from base (Netlify requirement);
# @netlify/plugin-nextjs reads .next and wires up SSR/route handlers — it does not
# serve raw .next as a static site.
#
# Netlify UI (Site configuration → Build & deploy → Build settings):
#   Base directory, Package directory, Build command, Publish directory — all EMPTY.
# If any of those are filled in, they can override this file and break routing.
[build]
  base = "new-site"
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"
  # Env vars are pre-loaded in Netlify for Phase 2. NEXT_PUBLIC_* are intentionally
  # inlined into client bundles; DARWIN_* server keys belong in route handlers only.
  # VM-only Darwin keys (PUSH/KAFKA/LINX/LDBWS) are omitted from scanning too so
  # harmless value matches (e.g. /etc/ssl/cert.pem in binaries) do not block deploys.
  SECRETS_SCAN_OMIT_PATHS = ".netlify/**,node_modules/**"
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "/etc/ssl/cert.pem"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_DATABASE_URL,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID,NEXT_PUBLIC_RECAPTCHA_SITE_KEY,NEXT_PUBLIC_USE_FIREBASE_EMULATOR,NEXT_PUBLIC_USE_LOCAL_DATA_ONLY,NEXT_PUBLIC_LOCAL_DEV_LOGIN_BYPASS,NEXT_PUBLIC_USE_OSM_PROXY,DARWIN_API_ORIGIN,DARWIN_API_KEY,DARWIN_UK_ONLY,DARWIN_LDBWS_API_KEY,DARWIN_LDBWS_CONSUMER_KEY,DARWIN_LDBWS_CONSUMER_SECRET,DARWIN_SERVICE_DETAILS_API_KEY,DARWIN_SERVICE_DETAILS_CONSUMER_KEY,DARWIN_SERVICE_DETAILS_CONSUMER_SECRET,DARWIN_PUSH_CONSUMER_GROUP,DARWIN_PUSH_USERNAME,DARWIN_PUSH_PASSWORD,DARWIN_PUSH_BROKERS,DARWIN_PUSH_TOPIC,DARWIN_PUSH_CA_CERT_PATH,DARWIN_REDIS_URL,DARWIN_KAFKA_BROKERS,DARWIN_KAFKA_TOPIC,DARWIN_KAFKA_CONSUMER_GROUP,DARWIN_KAFKA_USERNAME,DARWIN_KAFKA_PASSWORD,DARWIN_KAFKA_BOOTSTRAP_SERVER,DARWIN_KAFKA_SASL_MECHANISM,DARWIN_KAFKA_SECURITY_PROTOCOL,DARWIN_KAFKA_SASL_CONFIG,DARWIN_KAFKA_TOPIC_JSON,DARWIN_KAFKA_TOPIC_AVRO,DARWIN_KAFKA_TOPIC_XML,DARWIN_USERNAME,DARWIN_PASSWORD,DARWIN_DEPARTURES_SOURCE,DARWIN_LINX_BOOTSTRAP_SERVER,DARWIN_LINX_CONSUMER_GROUP,DARWIN_LINX_USERNAME,DARWIN_LINX_PASSWORD,DARWIN_LINX_TOPIC"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"
